<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
        <form action="halo.html" method="POST">
        <table>
            <tr>
                <td>Name</td>
                <td>:</td>
                <td><input type="text" name="nama" id="nama"></td>
            </tr>
            <tr>
                <td>Password</td>
                <td>:</td>
                <td><input type="password" name="password" id="password"></td>
            </tr>
            <tr>
                <td>Age Range</td>
                <td>:</td>
                <td><input type="number" id="age" name="age" min="16" max="30" placeholder="16-30"></td>
                <!-- <td><input type="range" id="age" name="age" min="16" max="30"></td> -->
            </tr>
            <tr>
                <td>Life Story</td>
                <td>:</td>
                <td><textarea name="" id="" placeholder="Enter you life story here"></textarea>
            </tr>
             <tr>
                <td>Your Favorite Sport</td>
                <td></td>
                <td>
                    <input type="radio" value="Tennis"> Tenis
                    <input type="radio" value="Cricket"> Cricket
                    <input type="radio" value="Baseball"> Baseball
                    <input type="radio" value="Polo"> Polo
                </td>
            </tr>
            <tr>
                <td>Language you choose</td>
                <td></td>
                <td>
                    <input type="checkbox" value="PHP"> PHP
                    <input type="checkbox" value="C++"> C++
                    <input type="checkbox" value="Delphi"> Delphi
                    <input type="checkbox" value="Java"> Java
                </td>
            </tr>
            <tr>
                <td><input type="submit"></td>
            </tr>
        </table>
    </form>
</body>
</html>
